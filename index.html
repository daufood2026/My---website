<!DOCTYPE html>
<html>
<head>
  <title>Route giao hàng by ĐậuHoàng</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { font-family: Arial; }
    #map { height: 500px; margin-top: 10px; }

    input {
      width: 320px;
      padding: 6px;
      margin: 4px;
      display: block;
    }

    button {
      padding: 6px 12px;
      margin: 5px;
      cursor: pointer;
    }

    #info {
      margin-top: 10px;
      font-weight: bold;
    }

    .number-marker {
      background: red;
      color: white;
      border-radius: 50%;
      text-align: center;
      line-height: 30px;
      width: 30px;
      height: 30px;
      font-weight: bold;
      border: 2px solid white;
    }
  </style>
</head>

<body>

<h3>🚚 Route giao hàng (by ĐậuHoàng)</h3>

<div id="inputs"></div>

<button onclick="addPoint()">+ Thêm điểm</button>
<button onclick="buildRoute()">Vẽ route</button>

<div id="info">Tổng quãng đường: 0 km</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// ===== MAP =====
var map = L.map('map').setView([21.0285, 105.8542], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);

let markers = [];
let routeLine;
let inputCount = 0;

// ===== ADD INPUT =====
function addPoint() {
  inputCount++;
  const input = document.createElement("input");
  input.placeholder = "Điểm " + inputCount;
  input.className = "point-input";
  document.getElementById("inputs").appendChild(input);
}

// tạo sẵn 3 điểm
addPoint();
addPoint();
addPoint();

// ===== GEOCODE =====
async function geocode(address) {
  const res = await fetch(
    "https://nominatim.openstreetmap.org/search?format=json&q=" + encodeURIComponent(address)
  );
  const data = await res.json();

  if (data.length === 0) return null;

  return [parseFloat(data[0].lat), parseFloat(data[0].lon)];
}

// ===== ICON SỐ =====
function createNumberIcon(number) {
  return L.divIcon({
    className: '',
    html: `<div class="number-marker">${number}</div>`,
    iconSize: [30, 30]
  });
}

// ===== VẼ ROUTE THẬT =====
async function drawRealRoute(points) {

  const coords = points.map(p => p[1] + "," + p[0]).join(";");

  const url = `https://router.project-osrm.org/route/v1/driving/${coords}?overview=full&geometries=geojson`;

  const res = await fetch(url);
  const data = await res.json();

  if (!data.routes || data.routes.length === 0) {
    alert("Không vẽ được route");
    return;
  }

  const route = data.routes[0];

  if (routeLine) map.removeLayer(routeLine);

  routeLine = L.geoJSON(route.geometry, {
    style: { color: 'blue', weight: 5 }
  }).addTo(map);

  map.fitBounds(routeLine.getBounds());

  // ===== KM =====
  const km = (route.distance / 1000).toFixed(2);
  document.getElementById("info").innerText =
    "Tổng quãng đường: " + km + " km";
}

// ===== BUILD ROUTE =====
async function buildRoute() {

  const inputs = document.querySelectorAll(".point-input");

  let addresses = [];
  inputs.forEach(i => {
    if (i.value) addresses.push(i.value);
  });

  if (addresses.length < 2) {
    alert("Nhập ít nhất 2 điểm");
    return;
  }

  // clear cũ
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  if (routeLine) map.removeLayer(routeLine);

  let points = [];

  for (let addr of addresses) {
    const p = await geocode(addr);
    if (!p) {
      alert("Không tìm thấy: " + addr);
      return;
    }
    points.push(p);
  }

  // ===== MARKER + POPUP =====
  points.forEach((p, i) => {
    const marker = L.marker(p, {
      icon: createNumberIcon(i + 1)
    })
    .addTo(map)
    .bindPopup(`
      <b>🚚 Điểm ${i + 1}</b><br>
      📍 ${addresses[i]}
    `);

    markers.push(marker);
  });

  // ===== ROUTE =====
  await drawRealRoute(points);
}

</script>

</body>
</html>
