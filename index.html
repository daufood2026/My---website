<!DOCTYPE html>
<html>
<head>
  <title>Route giao hàng by_turtle1</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { font-family: Arial; }
    #map { height: 500px; margin-top: 10px; }

    input {
      width: 320px;
      padding: 6px;
      margin: 4px;
      display: block;
    }

    button { padding: 6px 12px; margin: 5px; }

    #info { margin-top: 10px; font-weight: bold; }

    .number-marker {
      background: red;
      color: white;
      border-radius: 50%;
      text-align: center;
      line-height: 30px;
      width: 30px;
      height: 30px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h3>🚚 Route giao hàng by_turtle1</h3>

<div id="inputs"></div>

<button onclick="addPoint()">+ Thêm điểm</button>
<button onclick="buildRoute()">Vẽ route</button>

<div id="info">Tổng quãng đường: 0 km</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// ===== MAP =====
var map = L.map('map').setView([21.0285, 105.8542], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);

let markers = [];
let routeLine;
let inputCount = 0;

// ===== ADD INPUT =====
function addPoint() {
  inputCount++;
  const input = document.createElement("input");
  input.placeholder = "Điểm " + inputCount;
  input.className = "point-input";
  document.getElementById("inputs").appendChild(input);
}

// mặc định 3 điểm
addPoint(); addPoint(); addPoint();

// ===== GEOCODE =====
async function geocode(address) {
  const res = await fetch(
    "https://nominatim.openstreetmap.org/search?format=json&q=" + encodeURIComponent(address)
  );
  const data = await res.json();
  if (data.length === 0) return null;
  return [parseFloat(data[0].lat), parseFloat(data[0].lon)];
}

// ===== ICON =====
function createNumberIcon(number) {
  return L.divIcon({
    html: `<div class="number-marker">${number}</div>`,
    iconSize: [30, 30]
  });
}

// ===== DISTANCE =====
function distance(a, b) {
  return Math.sqrt(
    (a[0]-b[0])**2 + (a[1]-b[1])**2
  );
}

// ===== GREEDY OPTIMIZE =====
function optimizeRoute(points, addresses) {

  let orderedPoints = [points[0]];
  let orderedAddresses = [addresses[0]];

  let remainingPoints = points.slice(1);
  let remainingAddr = addresses.slice(1);

  while (remainingPoints.length > 0) {
    let last = orderedPoints[orderedPoints.length - 1];

    let minIndex = 0;
    let minDist = distance(last, remainingPoints[0]);

    for (let i = 1; i < remainingPoints.length; i++) {
      let d = distance(last, remainingPoints[i]);
      if (d < minDist) {
        minDist = d;
        minIndex = i;
      }
    }

    orderedPoints.push(remainingPoints[minIndex]);
    orderedAddresses.push(remainingAddr[minIndex]);

    remainingPoints.splice(minIndex, 1);
    remainingAddr.splice(minIndex, 1);
  }

  return { orderedPoints, orderedAddresses };
}

// ===== OSRM ROUTE =====
async function drawRoute(points) {

  const coords = points.map(p => p[1]+","+p[0]).join(";");

  const url = `https://router.project-osrm.org/route/v1/driving/${coords}?overview=full&geometries=geojson`;

  const res = await fetch(url);
  const data = await res.json();

  const route = data.routes[0];

  if (routeLine) map.removeLayer(routeLine);

  routeLine = L.geoJSON(route.geometry, {
    style: { color: 'blue', weight: 5 }
  }).addTo(map);

  map.fitBounds(routeLine.getBounds());

  document.getElementById("info").innerText =
    "Tổng quãng đường: " + (route.distance/1000).toFixed(2) + " km";
}

// ===== BUILD =====
async function buildRoute() {

  const inputs = document.querySelectorAll(".point-input");

  let addresses = [];
  inputs.forEach(i => {
    if (i.value) addresses.push(i.value);
  });

  if (addresses.length < 2) {
    alert("Nhập ít nhất 2 điểm");
    return;
  }

  markers.forEach(m => map.removeLayer(m));
  markers = [];
  if (routeLine) map.removeLayer(routeLine);

  let points = [];

  for (let addr of addresses) {
    const p = await geocode(addr);
    if (!p) {
      alert("Không tìm thấy: " + addr);
      return;
    }
    points.push(p);
  }

  // ===== OPTIMIZE =====
  const { orderedPoints, orderedAddresses } =
    optimizeRoute(points, addresses);

  // ===== MARKER =====
  orderedPoints.forEach((p, i) => {
    const marker = L.marker(p, {
      icon: createNumberIcon(i+1)
    })
    .addTo(map)
    .bindPopup(`<b>Điểm ${i+1}</b><br>${orderedAddresses[i]}`);

    markers.push(marker);
  });

  // ===== ROUTE =====
  await drawRoute(orderedPoints);
}

</script>

</body>
</html>
