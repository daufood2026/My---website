<!DOCTYPE html>
<html>
<head>
  <title>Route tối ưu nhập địa chỉ</title>
  <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY"></script>
  <style>
    #map { height: 500px; }
    input { margin: 5px; width: 300px; }
  </style>
</head>
<body>

<h3>Nhập 3 địa chỉ giao hàng</h3>

<input id="addr1" placeholder="Địa chỉ 1"><br>
<input id="addr2" placeholder="Địa chỉ 2"><br>
<input id="addr3" placeholder="Địa chỉ 3"><br>

<button onclick="calcRoute()">Tính route</button>

<div id="map"></div>

<script>
let map, directionsService, directionsRenderer, geocoder;

function initMap() {
  map = new google.maps.Map(document.getElementById("map"), {
    zoom: 13,
    center: { lat: 21.02473059479963, lng: 105.93939535578636 }
  });

  directionsService = new google.maps.DirectionsService();
  directionsRenderer = new google.maps.DirectionsRenderer({ map: map });
  geocoder = new google.maps.Geocoder();
}

function geocodeAddress(address) {
  return new Promise((resolve, reject) => {
    geocoder.geocode({ address: address }, (results, status) => {
      if (status === "OK") {
        resolve(results[0].geometry.location);
      } else {
        reject("Không tìm thấy: " + address);
      }
    });
  });
}

async function calcRoute() {
  try {
    const a1 = document.getElementById("addr1").value;
    const a2 = document.getElementById("addr2").value;
    const a3 = document.getElementById("addr3").value;

    const p1 = await geocodeAddress(a1);
    const p2 = await geocodeAddress(a2);
    const p3 = await geocodeAddress(a3);

    const origin = { lat: 21.02473059479963, lng: 105.93939535578636 };

    const waypoints = [
      { location: p1 },
      { location: p2 }
    ];

    const destination = p3;

    directionsService.route({
      origin: origin,
      destination: destination,
      waypoints: waypoints,
      optimizeWaypoints: true, // 🔥 Tự sắp xếp gần → xa
      travelMode: "DRIVING"
    }, (result, status) => {

      if (status === "OK") {
        directionsRenderer.setDirections(result);

        const order = result.routes[0].waypoint_order;
        console.log("Thứ tự tối ưu:", order);

        alert("Route đã tối ưu xong! Check console để xem thứ tự.");
      } else {
        alert("Lỗi: " + status);
      }

    });

  } catch (err) {
    alert(err);
  }
}

window.onload = initMap;
</script>

</body>
</html>
