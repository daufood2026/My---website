<!DOCTYPE html>
<html>
<head>
  <title>Map tìm địa chỉ (by_htl_Turtle)</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { font-family: Arial; }
    #map { height: 500px; margin-top: 10px; }
    input { width: 300px; padding: 5px; margin: 3px; }
    button { padding: 6px 10px; margin: 5px; }
  </style>
</head>

<body>

<h3>🚚 Map tìm địa chỉ (by_htl_Turtle)</h3>

<input id="addr1" placeholder="Điểm 1"><br>
<input id="addr2" placeholder="Điểm 2"><br>
<input id="addr3" placeholder="Điểm 3"><br>

<button onclick="buildRoute()">Vẽ route</button>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// ===== MAP =====
var map = L.map('map').setView([21.0285, 105.8542], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);

let markers = [];
let routeLine;

// ===== GEOCODE =====
async function geocode(address) {
  const res = await fetch(
    "https://nominatim.openstreetmap.org/search?format=json&q=" + encodeURIComponent(address)
  );
  const data = await res.json();

  if (data.length === 0) return null;

  return [parseFloat(data[0].lat), parseFloat(data[0].lon)];
}

// ===== BUILD ROUTE =====
async function buildRoute() {

  const inputs = [
    document.getElementById("addr1").value,
    document.getElementById("addr2").value,
    document.getElementById("addr3").value
  ].filter(x => x);

  if (inputs.length < 2) {
    alert("Nhập ít nhất 2 điểm");
    return;
  }

  // clear cũ
  markers.forEach(m => map.removeLayer(m));
  markers = [];

  if (routeLine) {
    map.removeLayer(routeLine);
  }

  let points = [];

  for (let addr of inputs) {
    const p = await geocode(addr);
    if (!p) {
      alert("Không tìm thấy: " + addr);
      return;
    }
    points.push(p);
  }

  // ===== SORT GẦN → XA (đơn giản) =====
  const start = points[0];

  points.sort((a, b) => {
    const da = distance(start, a);
    const db = distance(start, b);
    return da - db;
  });

  // ===== MARKER + SỐ THỨ TỰ =====
  points.forEach((p, i) => {
    const marker = L.marker(p)
      .addTo(map)
      .bindPopup("Điểm " + (i + 1))
      .openPopup();

    markers.push(marker);
  });

  // ===== VẼ ĐƯỜNG =====
  routeLine = L.polyline(points, { color: 'blue' }).addTo(map);

  map.fitBounds(routeLine.getBounds());
}

// ===== TÍNH KHOẢNG CÁCH =====
function distance(a, b) {
  return Math.sqrt(
    Math.pow(a[0] - b[0], 2) +
    Math.pow(a[1] - b[1], 2)
  );
}

</script>

</body>
</html>
