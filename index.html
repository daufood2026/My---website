<!DOCTYPE html>
<html>
<head>
  <title>Route giao hàng (by_turtle)</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { font-family: Arial; }
    #map { height: 500px; margin-top: 10px; }

    input { width: 300px; padding: 5px; margin: 3px; }
    button { padding: 6px 10px; margin: 5px; }

    #info {
      margin-top: 10px;
      font-weight: bold;
    }

    /* marker số */
    .number-marker {
      background: #007bff;
      color: white;
      border-radius: 50%;
      text-align: center;
      line-height: 30px;
      width: 30px;
      height: 30px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h3>🚚 Route giao hàng (by_turtle)</h3>

<input id="addr1" placeholder="Điểm 1"><br>
<input id="addr2" placeholder="Điểm 2"><br>
<input id="addr3" placeholder="Điểm 3"><br>
<input id="addr3" placeholder="Điểm 4htl"><br>

<button onclick="buildRoute()">Vẽ route</button>

<div id="info">Tổng quãng đường: 0 km</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// ===== MAP =====
var map = L.map('map').setView([21.0285, 105.8542], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);

let markers = [];
let routeLine;

// ===== GEOCODE =====
async function geocode(address) {
  const res = await fetch(
    "https://nominatim.openstreetmap.org/search?format=json&q=" + encodeURIComponent(address)
  );
  const data = await res.json();

  if (data.length === 0) return null;

  return [parseFloat(data[0].lat), parseFloat(data[0].lon)];
}

// ===== DISTANCE SORT =====
function distance(a, b) {
  return Math.sqrt(
    Math.pow(a[0] - b[0], 2) +
    Math.pow(a[1] - b[1], 2)
  );
}

// ===== ICON SỐ =====
function createNumberIcon(number) {
  return L.divIcon({
    className: '',
    html: `<div class="number-marker">${number}</div>`,
    iconSize: [30, 30]
  });
}

// ===== ROUTE REAL =====
async function drawRealRoute(points) {

  const coords = points.map(p => p[1] + "," + p[0]).join(";");

  const url = `https://router.project-osrm.org/route/v1/driving/${coords}?overview=full&geometries=geojson`;

  const res = await fetch(url);
  const data = await res.json();

  if (!data.routes || data.routes.length === 0) {
    alert("Không vẽ được route");
    return;
  }

  const route = data.routes[0];

  // VẼ LINE
  if (routeLine) map.removeLayer(routeLine);

  routeLine = L.geoJSON(route.geometry, {
    style: { color: 'blue', weight: 5 }
  }).addTo(map);

  map.fitBounds(routeLine.getBounds());

  // ===== HIỂN THỊ KM =====
  const km = (route.distance / 1000).toFixed(2);
  document.getElementById("info").innerText = "Tổng quãng đường: " + km + " km";
}

// ===== BUILD =====
async function buildRoute() {

  const inputs = [
    document.getElementById("addr1").value,
    document.getElementById("addr2").value,
    document.getElementById("addr3").value
  ].filter(x => x);

  if (inputs.length < 2) {
    alert("Nhập ít nhất 2 điểm");
    return;
  }

  // clear cũ
  markers.forEach(m => map.removeLayer(m));
  markers = [];

  if (routeLine) map.removeLayer(routeLine);

  let points = [];

  for (let addr of inputs) {
    const p = await geocode(addr);
    if (!p) {
      alert("Không tìm thấy: " + addr);
      return;
    }
    points.push(p);
  }

  // SORT
  const start = points[0];

  points.sort((a, b) => {
    return distance(start, a) - distance(start, b);
  });

  // MARKER SỐ
  points.forEach((p, i) => {
    const marker = L.marker(p, {
      icon: createNumberIcon(i + 1)
    }).addTo(map);

    markers.push(marker);
  });

  // ROUTE
  await drawRealRoute(points);
}

</script>

</body>
</html>
